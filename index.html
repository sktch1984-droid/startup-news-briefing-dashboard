<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKTCH Report Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="dashboard-header">
        <div class="container header-inner">
            <div class="logo">
                <span class="logo-mark">S</span>
                <span class="logo-text">SKTCH Report Dashboard</span>
            </div>
            <div class="header-meta">
                <span class="header-date" id="headerDate"></span>
                <span class="header-badge" id="headerBadge"></span>
                <button class="icon-btn" id="tokenBtn" title="GitHub 토큰 설정"><i class="fa-solid fa-key"></i></button>
                <button class="icon-btn primary" id="addReportBtn" title="보고서 추가"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar">
        <div class="container stats-inner" id="statsBar"></div>
    </section>

    <!-- Filter Bar -->
    <section class="filter-bar">
        <div class="container filter-inner">
            <div class="filter-group" id="categoryFilters"></div>
            <div class="filter-group" id="statusFilters"></div>
        </div>
    </section>

    <!-- Report Cards -->
    <section class="report-section">
        <div class="container">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-layer-group"></i> 프로젝트 보고서</h2>
            </div>
            <div class="report-grid" id="reportGrid"></div>
        </div>
    </section>

    <!-- Timeline -->
    <section class="timeline-section">
        <div class="container">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-timeline"></i> 프로젝트 타임라인</h2>
            </div>
            <div class="timeline-chart">
                <div class="timeline-header">
                    <div class="tl-label-col">프로젝트</div>
                    <div class="tl-months">
                        <span>4월</span><span>5월</span><span>6월</span><span>7월</span><span>8월</span><span>9월</span><span>10월</span><span>11월</span><span>12월</span>
                    </div>
                </div>
                <div class="timeline-body" id="timelineBody">
                    <div class="today-line" id="todayLine"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Add Report Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3>새 보고서 추가</h3>
                <button class="icon-btn" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="reportForm" class="modal-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>ID (영문, 고유값)</label>
                        <input type="text" name="reportId" placeholder="new-project" required>
                    </div>
                    <div class="form-group">
                        <label>프로젝트명</label>
                        <input type="text" name="reportTitle" placeholder="프로젝트 제목" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>카테고리</label>
                        <select name="reportCategory" required>
                            <option value="ux">UX/UI</option>
                            <option value="ai">AI/AX</option>
                            <option value="data">데이터</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>상태</label>
                        <select name="reportStatus" required>
                            <option value="progress">진행중</option>
                            <option value="live">운영중</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>요약</label>
                    <textarea name="reportSummary" rows="3" placeholder="프로젝트 핵심 내용 2~3줄 요약" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>키워드 (쉼표 구분)</label>
                        <input type="text" name="reportKeywords" placeholder="키워드1, 키워드2, 키워드3" required>
                    </div>
                    <div class="form-group">
                        <label>보고서 URL</label>
                        <input type="url" name="reportUrl" placeholder="https://..." required>
                    </div>
                </div>
                <div class="form-group">
                    <label>기간</label>
                    <input type="text" name="reportPeriod" placeholder="2026.07 ~ 12">
                </div>
                <div class="form-group">
                    <label>마일스톤 (줄별 1개, [done]/[current]/[upcoming] 접두어)</label>
                    <textarea name="reportMilestones" rows="4" placeholder="[done] 기획 완료&#10;[current] 개발 진행중&#10;[upcoming] 배포 예정"></textarea>
                </div>
                <div class="form-group">
                    <label>타임라인 (줄별: 시작칸-끝칸 라벨 [active]/[future])</label>
                    <textarea name="reportTimeline" rows="3" placeholder="1-3 기획&#10;3-7 개발 [active]&#10;7-10 운영 [future]"></textarea>
                    <span class="form-hint">칸 번호: 1=4월, 2=5월, ... 9=12월</span>
                </div>
                <button type="submit" class="submit-btn">보고서 추가</button>
            </form>
        </div>
    </div>

    <footer class="dashboard-footer">
        <div class="container">
            <p>SKTCH Report Dashboard &middot; Last updated <span id="footerDate"></span></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
