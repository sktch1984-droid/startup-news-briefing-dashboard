<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKTCH Report Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="dashboard-header">
        <div class="container header-inner">
            <div class="logo">
                <span class="logo-mark">S</span>
                <span class="logo-text">SKTCH Report Dashboard</span>
            </div>
            <div class="header-meta">
                <span class="header-date" id="headerDate"></span>
                <span class="header-badge" id="headerBadge"></span>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar">
        <div class="container stats-inner" id="statsBar"></div>
    </section>

    <!-- Filter Bar -->
    <section class="filter-bar">
        <div class="container filter-inner">
            <div class="filter-group" id="categoryFilters"></div>
            <div class="filter-group" id="statusFilters"></div>
        </div>
    </section>

    <!-- Report Cards -->
    <section class="report-section">
        <div class="container">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-layer-group"></i> 프로젝트 보고서</h2>
            </div>
            <div class="report-grid" id="reportGrid"></div>
        </div>
    </section>

    <!-- Timeline -->
    <section class="timeline-section">
        <div class="container">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-timeline"></i> 프로젝트 타임라인</h2>
            </div>
            <div class="timeline-chart">
                <div class="timeline-header">
                    <div class="tl-label-col">프로젝트</div>
                    <div class="tl-months">
                        <span>4월</span><span>5월</span><span>6월</span><span>7월</span><span>8월</span><span>9월</span><span>10월</span><span>11월</span><span>12월</span>
                    </div>
                </div>
                <div class="timeline-body" id="timelineBody">
                    <div class="today-line" id="todayLine"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="dashboard-footer">
        <div class="container">
            <p>SKTCH Report Dashboard &middot; Last updated <span id="footerDate"></span></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
